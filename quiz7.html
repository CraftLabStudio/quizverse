<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Space Exploration Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #08111f;
            color: white;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px;
        }

        .quiz-container {
            width: 100%;
            max-width: 950px;

            background: #101827;

            border-radius: 30px;

            padding: 35px;

            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;

            margin-bottom: 35px;
        }

        .back-btn {
            width: 48px;
            height: 48px;

            background: #f6c453;

            border-radius: 14px;

            display: flex;
            justify-content: center;
            align-items: center;

            text-decoration: none;

            color: black;

            font-size: 20px;

            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.08);
        }

        .progress-container {
            flex: 1;
        }

        .progress-bar {
            width: 100%;
            height: 12px;

            background: rgba(255, 255, 255, 0.08);

            border-radius: 50px;

            overflow: hidden;
        }

        .progress {
            width: 0%;

            height: 100%;

            background: #f6c453;

            border-radius: 50px;

            transition: 0.3s;
        }

        .quiz-title {
            text-align: center;

            margin-bottom: 35px;
        }

        .quiz-title h1 {
            font-size: 42px;
            color: #f6c453;
        }

        .quiz-box {
            background: #162133;

            border-radius: 25px;

            padding: 35px;
        }

        .question-top {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 25px;
        }

        .question-top h2 {
            color: #f6c453;
            font-size: 24px;
        }

        .timer {
            background: rgba(246, 196, 83, 0.15);

            color: #f6c453;

            padding: 10px 18px;

            border-radius: 12px;

            font-weight: 600;
        }

        #question {
            font-size: 34px;

            margin-bottom: 35px;

            line-height: 1.4;
        }

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .option-btn {
            background: transparent;

            border: 2px solid rgba(255, 255, 255, 0.08);

            color: white;

            padding: 22px;

            border-radius: 18px;

            font-size: 22px;

            cursor: pointer;

            transition: 0.3s;
        }

        .option-btn:hover {
            border-color: #f6c453;

            transform: translateY(-4px);
        }

        .option-btn.selected {
            background: rgba(246, 196, 83, 0.12);

            border-color: #f6c453;

            color: #f6c453;
        }

        .buttons {
            margin-top: 35px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            flex-wrap: wrap;

            gap: 15px;
        }

        .left-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            border: none;

            padding: 14px 28px;

            border-radius: 50px;

            cursor: pointer;

            font-size: 15px;

            transition: 0.3s;
        }

        .prev-btn,
        .next-btn {
            background: #1f2b40;
            color: white;
        }

        .submit-btn {
            background: #f6c453;
            color: black;

            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-4px);
        }

        .result-box {
            margin-top: 30px;

            padding: 20px;

            border-radius: 18px;

            text-align: center;

            display: none;
        }

        .success {
            background: rgba(46, 204, 113, 0.15);

            border: 1px solid #2ecc71;

            color: #2ecc71;
        }

        .timeout {
            background: rgba(231, 76, 60, 0.15);

            border: 1px solid #e74c3c;

            color: #ff8f8f;
        }

        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: center;

            flex-wrap: wrap;

            gap: 20px;

            margin-bottom: 35px;
        }

        .review-title {
            font-size: 38px;
            color: #f6c453;
        }

        .score-board {
            display: flex;
            gap: 15px;

            flex-wrap: wrap;
        }

        .score-card {
            background: #101827;

            padding: 18px 24px;

            border-radius: 18px;

            text-align: center;

            min-width: 130px;
        }

        .score-card h3 {
            font-size: 28px;

            margin-bottom: 8px;
        }

        .score-card p {
            color: #cbd5e1;
            font-size: 14px;
        }

        .correct-score h3 {
            color: #2ecc71;
        }

        .wrong-score h3 {
            color: #ff6b6b;
        }

        .attempted-score h3 {
            color: #f6c453;
        }

        .total-score h3 {
            color: #60a5fa;
        }

        .review-question {
            background: #162133;

            padding: 25px;

            border-radius: 20px;

            margin-bottom: 30px;
        }

        .review-question h3 {
            margin-bottom: 20px;

            font-size: 24px;

            line-height: 1.5;
        }

        .review-option {
            padding: 16px;

            border-radius: 14px;

            margin-bottom: 12px;

            border: 2px solid rgba(255, 255, 255, 0.08);

            font-size: 18px;
        }

        .correct-answer {
            background: rgba(46, 204, 113, 0.15);

            border-color: #2ecc71;

            color: #2ecc71;
        }

        .wrong-answer {
            background: rgba(231, 76, 60, 0.15);

            border-color: #e74c3c;

            color: #ff8f8f;
        }

        .your-answer {
            margin-top: 15px;

            color: #ffb347;

            font-weight: 500;
        }

        .correct-text {
            color: #2ecc71;

            font-weight: 600;

            margin-top: 8px;
        }

        @media(max-width: 768px) {

            .options {
                grid-template-columns: 1fr;
            }

            #question {
                font-size: 26px;
            }

            .quiz-title h1 {
                font-size: 30px;
            }

            .buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .left-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .review-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .score-board {
                width: 100%;
            }

            .score-card {
                flex: 1;
            }
        }
    </style>

</head>

<body>

    <div class="quiz-container">

        <div class="top-bar">

            <a href="index.html" class="back-btn">
                ←
            </a>

            <div class="progress-container">

                <div class="progress-bar">

                    <div class="progress" id="progress"></div>

                </div>

            </div>

        </div>

        <div class="quiz-title">

            <h1>
                SPACE EXPLORATION QUIZ
            </h1>

        </div>

        <div class="quiz-box">

            <div class="question-top">

                <h2 id="question-number">
                    Question 1
                </h2>

                <div class="timer" id="timer">
                    3:00
                </div>

            </div>

            <div id="question"></div>

            <div class="options" id="options"></div>

            <div class="buttons">

                <div class="left-buttons">

                    <button class="btn prev-btn" id="prevBtn">
                        Previous
                    </button>

                    <button class="btn next-btn" id="nextBtn">
                        Next
                    </button>

                </div>

                <button class="btn submit-btn" id="submitBtn">
                    Submit Quiz
                </button>

            </div>

            <div class="result-box" id="resultBox">

                <h2 id="resultTitle"></h2>

                <p id="resultText"></p>

            </div>

        </div>

    </div>

    <script>

        const quizData = [

            {
                question: "Who was the first human to travel into space?",
                options: ["Neil Armstrong", "Yuri Gagarin", "Buzz Aldrin", "John Glenn"],
                answer: "Yuri Gagarin"
            },

            {
                question: "Which planet is known as the Red Planet?",
                options: ["Venus", "Mars", "Jupiter", "Mercury"],
                answer: "Mars"
            },

            {
                question: "What was the name of the first satellite launched into space?",
                options: ["Apollo 11", "Sputnik 1", "Voyager 1", "Hubble"],
                answer: "Sputnik 1"
            },

            {
                question: "Who was the first person to walk on the Moon?",
                options: ["Buzz Aldrin", "Yuri Gagarin", "Neil Armstrong", "Michael Collins"],
                answer: "Neil Armstrong"
            },

            {
                question: "Which space agency launched the Apollo missions?",
                options: ["ESA", "ISRO", "NASA", "SpaceX"],
                answer: "NASA"
            },

            {
                question: "What is the name of the largest planet in our Solar System?",
                options: ["Saturn", "Earth", "Jupiter", "Neptune"],
                answer: "Jupiter"
            },

            {
                question: "Which rover explored Mars in 2021?",
                options: ["Curiosity", "Opportunity", "Perseverance", "Spirit"],
                answer: "Perseverance"
            },

            {
                question: "Which galaxy contains our Solar System?",
                options: ["Andromeda", "Milky Way", "Whirlpool", "Sombrero"],
                answer: "Milky Way"
            },

            {
                question: "What is Earth's natural satellite called?",
                options: ["Europa", "Titan", "Moon", "Phobos"],
                answer: "Moon"
            },

            {
                question: "Which planet is famous for its rings?",
                options: ["Mars", "Jupiter", "Saturn", "Uranus"],
                answer: "Saturn"
            },

            {
                question: "Who was the first woman in space?",
                options: ["Kalpana Chawla", "Valentina Tereshkova", "Sally Ride", "Sunita Williams"],
                answer: "Valentina Tereshkova"
            },

            {
                question: "Which telescope was launched into space in 1990?",
                options: ["James Webb Telescope", "Hubble Space Telescope", "Kepler Telescope", "Spitzer Telescope"],
                answer: "Hubble Space Telescope"
            },

            {
                question: "Which company developed the Falcon 9 rocket?",
                options: ["NASA", "Blue Origin", "ISRO", "SpaceX"],
                answer: "SpaceX"
            },

            {
                question: "What is the closest star to Earth?",
                options: ["Alpha Centauri", "Polaris", "Sun", "Sirius"],
                answer: "Sun"
            },

            {
                question: "Which Indian astronaut traveled to space in 1984?",
                options: ["Rakesh Sharma", "Kalpana Chawla", "Sunita Williams", "Vikram Sarabhai"],
                answer: "Rakesh Sharma"
            }

        ];

        let currentQuestion = 0;

        let selectedAnswers =
            new Array(quizData.length).fill(null);

        const questionEl =
            document.getElementById("question");

        const optionsEl =
            document.getElementById("options");

        const questionNumber =
            document.getElementById("question-number");

        const progress =
            document.getElementById("progress");

        function loadQuestion() {

            const currentQuiz =
                quizData[currentQuestion];

            questionEl.innerText =
                currentQuiz.question;

            questionNumber.innerText =
                `Question ${currentQuestion + 1}`;

            progress.style.width =
                `${((currentQuestion + 1) / quizData.length) * 100}%`;

            optionsEl.innerHTML = "";

            currentQuiz.options.forEach(option => {

                const button =
                    document.createElement("button");

                button.classList.add("option-btn");

                button.innerText = option;

                if (
                    selectedAnswers[currentQuestion]
                    === option
                ) {

                    button.classList.add("selected");
                }

                button.addEventListener("click", () => {

                    selectedAnswers[currentQuestion]
                        = option;

                    document.querySelectorAll(".option-btn")
                        .forEach(btn =>
                            btn.classList.remove("selected"));

                    button.classList.add("selected");

                });

                optionsEl.appendChild(button);

            });

        }

        loadQuestion();

        document.getElementById("nextBtn")
            .addEventListener("click", () => {

                if (
                    currentQuestion <
                    quizData.length - 1
                ) {

                    currentQuestion++;

                    loadQuestion();

                }

            });

        document.getElementById("prevBtn")
            .addEventListener("click", () => {

                if (currentQuestion > 0) {

                    currentQuestion--;

                    loadQuestion();

                }

            });

        let timeLeft = 180;

        const timerEl =
            document.getElementById("timer");

        const countdown = setInterval(() => {

            let minutes =
                Math.floor(timeLeft / 60);

            let seconds =
                timeLeft % 60;

            seconds =
                seconds < 10
                    ? "0" + seconds
                    : seconds;

            timerEl.innerText =
                `${minutes}:${seconds}`;

            timeLeft--;

            if (timeLeft < 0) {

                clearInterval(countdown);

                showResult(
                    "Time Is Over!",
                    "Quiz submitted automatically.",
                    "timeout"
                );

                setTimeout(() => {

                    showReview();

                }, 2500);

            }

        }, 1000);

        document.getElementById("submitBtn")
            .addEventListener("click", () => {

                clearInterval(countdown);

                showResult(
                    "Quiz Submitted!",
                    "Calculating your score...",
                    "success"
                );

                setTimeout(() => {

                    showReview();

                }, 2000);

            });

        function showResult(title, text, type) {

            const resultBox =
                document.getElementById("resultBox");

            const resultTitle =
                document.getElementById("resultTitle");

            const resultText =
                document.getElementById("resultText");

            resultTitle.innerText = title;

            resultText.innerText = text;

            resultBox.style.display = "block";

            resultBox.className =
                `result-box ${type}`;

        }

        function showReview() {

            const quizBox =
                document.querySelector(".quiz-box");

            let correct = 0;
            let wrong = 0;
            let attempted = 0;

            quizData.forEach((quiz, index) => {

                const userAnswer =
                    selectedAnswers[index];

                if (userAnswer !== null) {

                    attempted++;

                }

                if (userAnswer === quiz.answer) {

                    correct++;

                }

                else if (
                    userAnswer !== null &&
                    userAnswer !== quiz.answer
                ) {

                    wrong++;

                }

            });

            let reviewHTML = `

                <div class="review-top">

                    <h2 class="review-title">
                        Quiz Review
                    </h2>

                    <div class="score-board">

                        <div class="
                            score-card
                            total-score
                        ">

                            <h3>
                                ${correct}/${quizData.length}
                            </h3>

                            <p>Total Marks</p>

                        </div>

                        <div class="
                            score-card
                            attempted-score
                        ">

                            <h3>
                                ${attempted}
                            </h3>

                            <p>Attempted</p>

                        </div>

                        <div class="
                            score-card
                            correct-score
                        ">

                            <h3>
                                ${correct}
                            </h3>

                            <p>Correct</p>

                        </div>

                        <div class="
                            score-card
                            wrong-score
                        ">

                            <h3>
                                ${wrong}
                            </h3>

                            <p>Wrong</p>

                        </div>

                    </div>

                </div>

            `;

            quizData.forEach((quiz, index) => {

                const userAnswer =
                    selectedAnswers[index];

                const correctAnswer =
                    quiz.answer;

                reviewHTML += `

                    <div class="review-question">

                        <h3>
                            Q${index + 1}.
                            ${quiz.question}
                        </h3>

                `;

                quiz.options.forEach(option => {

                    let className = "";

                    if (
                        option === correctAnswer
                    ) {

                        className =
                            "correct-answer";
                    }

                    if (
                        option === userAnswer &&
                        option !== correctAnswer
                    ) {

                        className =
                            "wrong-answer";
                    }

                    reviewHTML += `

                        <div class="
                            review-option
                            ${className}
                        ">

                            ${option}

                        </div>

                    `;

                });

                reviewHTML += `

                        <p class="your-answer">

                            Your Answer:
                            ${userAnswer
                        ? userAnswer
                        : "Not Attempted"}

                        </p>

                        <p class="correct-text">

                            Correct Answer:
                            ${correctAnswer}

                        </p>

                    </div>

                `;

            });

            quizBox.innerHTML = reviewHTML;

        }

    </script>

</body>

</html>
