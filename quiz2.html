<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Science & Technology Quiz</title>

    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Poppins", sans-serif;
        }

        body {
            background: #08111f;
            color: white;

            min-height: 100vh;

            display: flex;
            justify-content: center;
            align-items: center;

            padding: 30px;
        }

        .quiz-container {
            width: 100%;
            max-width: 950px;

            background: #101827;

            border-radius: 30px;

            padding: 35px;

            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.5);
        }

        /* Top */

        .top-bar {
            display: flex;
            align-items: center;
            gap: 20px;

            margin-bottom: 35px;
        }

        .back-btn {
            width: 48px;
            height: 48px;

            background: #f6c453;

            border-radius: 14px;

            display: flex;
            justify-content: center;
            align-items: center;

            text-decoration: none;

            color: black;

            font-size: 20px;

            transition: 0.3s;
        }

        .back-btn:hover {
            transform: scale(1.08);
        }

        .progress-container {
            flex: 1;
        }

        .progress-bar {
            width: 100%;
            height: 12px;

            background: rgba(255, 255, 255, 0.08);

            border-radius: 50px;

            overflow: hidden;
        }

        .progress {
            width: 0%;

            height: 100%;

            background: #f6c453;

            border-radius: 50px;

            transition: 0.3s;
        }

        /* Title */

        .quiz-title {
            text-align: center;

            margin-bottom: 35px;
        }

        .quiz-title h1 {
            font-size: 42px;
            color: #f6c453;
        }

        /* Quiz Box */

        .quiz-box {
            background: #162133;

            border-radius: 25px;

            padding: 35px;
        }

        .question-top {
            display: flex;
            justify-content: space-between;
            align-items: center;

            margin-bottom: 25px;
        }

        .question-top h2 {
            color: #f6c453;
            font-size: 24px;
        }

        .timer {
            background: rgba(246, 196, 83, 0.15);

            color: #f6c453;

            padding: 10px 18px;

            border-radius: 12px;

            font-weight: 600;
        }

        #question {
            font-size: 34px;

            margin-bottom: 35px;

            line-height: 1.4;
        }

        /* Options */

        .options {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 20px;
        }

        .option-btn {
            background: transparent;

            border: 2px solid rgba(255, 255, 255, 0.08);

            color: white;

            padding: 22px;

            border-radius: 18px;

            font-size: 22px;

            cursor: pointer;

            transition: 0.3s;
        }

        .option-btn:hover {
            border-color: #f6c453;

            transform: translateY(-4px);
        }

        .option-btn.selected {
            background: rgba(246, 196, 83, 0.12);

            border-color: #f6c453;

            color: #f6c453;
        }

        /* Buttons */

        .buttons {
            margin-top: 35px;

            display: flex;
            justify-content: space-between;
            align-items: center;

            flex-wrap: wrap;

            gap: 15px;
        }

        .left-buttons {
            display: flex;
            gap: 15px;
        }

        .btn {
            border: none;

            padding: 14px 28px;

            border-radius: 50px;

            cursor: pointer;

            font-size: 15px;

            transition: 0.3s;
        }

        .prev-btn,
        .next-btn {
            background: #1f2b40;
            color: white;
        }

        .submit-btn {
            background: #f6c453;
            color: black;

            font-weight: 600;
        }

        .btn:hover {
            transform: translateY(-4px);
        }

        /* Result Message */

        .result-box {
            margin-top: 30px;

            padding: 20px;

            border-radius: 18px;

            text-align: center;

            display: none;
        }

        .success {
            background: rgba(46, 204, 113, 0.15);

            border: 1px solid #2ecc71;

            color: #2ecc71;
        }

        .timeout {
            background: rgba(231, 76, 60, 0.15);

            border: 1px solid #e74c3c;

            color: #ff8f8f;
        }

        /* Review */

        .review-top {
            display: flex;
            justify-content: space-between;
            align-items: center;

            flex-wrap: wrap;

            gap: 20px;

            margin-bottom: 35px;
        }

        .review-title {
            font-size: 38px;
            color: #f6c453;
        }

        .score-board {
            display: flex;
            gap: 15px;

            flex-wrap: wrap;
        }

        .score-card {
            background: #101827;

            padding: 18px 24px;

            border-radius: 18px;

            text-align: center;

            min-width: 130px;
        }

        .score-card h3 {
            font-size: 28px;

            margin-bottom: 8px;
        }

        .score-card p {
            color: #cbd5e1;
            font-size: 14px;
        }

        .correct-score h3 {
            color: #2ecc71;
        }

        .wrong-score h3 {
            color: #ff6b6b;
        }

        .attempted-score h3 {
            color: #f6c453;
        }

        .total-score h3 {
            color: #60a5fa;
        }

        .review-question {

            background: #162133;

            padding: 25px;

            border-radius: 20px;

            margin-bottom: 30px;
        }

        .review-question h3 {

            margin-bottom: 20px;

            font-size: 24px;

            line-height: 1.5;
        }

        .review-option {

            padding: 16px;

            border-radius: 14px;

            margin-bottom: 12px;

            border: 2px solid rgba(255, 255, 255, 0.08);

            font-size: 18px;
        }

        .correct-answer {

            background: rgba(46, 204, 113, 0.15);

            border-color: #2ecc71;

            color: #2ecc71;
        }

        .wrong-answer {

            background: rgba(231, 76, 60, 0.15);

            border-color: #e74c3c;

            color: #ff8f8f;
        }

        .your-answer {

            margin-top: 15px;

            color: #ffb347;

            font-weight: 500;
        }

        .correct-text {

            color: #2ecc71;

            font-weight: 600;

            margin-top: 8px;
        }

        @media(max-width: 768px) {

            .options {
                grid-template-columns: 1fr;
            }

            #question {
                font-size: 26px;
            }

            .quiz-title h1 {
                font-size: 30px;
            }

            .buttons {
                flex-direction: column;
                align-items: stretch;
            }

            .left-buttons {
                width: 100%;
            }

            .btn {
                width: 100%;
            }

            .review-top {
                flex-direction: column;
                align-items: flex-start;
            }

            .score-board {
                width: 100%;
            }

            .score-card {
                flex: 1;
            }
        }



        /* =========================================
   RESPONSIVE DESIGN
========================================= */

/* Tablets */

@media (max-width: 1024px) {

    body{
        padding:20px;
    }

    .quiz-container{
        padding:30px;
    }

    .quiz-title h1{
        font-size:36px;
    }

    #question{
        font-size:30px;
    }

    .option-btn{
        font-size:20px;
        padding:18px;
    }

    .review-title{
        font-size:32px;
    }

    .score-card{
        min-width:110px;
    }
}

/* Mobile */

@media (max-width: 768px) {

    body{
        padding:15px;
        align-items:flex-start;
    }

    .quiz-container{
        padding:20px;
        border-radius:22px;
    }

    .top-bar{
        flex-direction:column;
        align-items:flex-start;
        gap:15px;
        margin-bottom:25px;
    }

    .back-btn{
        width:44px;
        height:44px;
        font-size:18px;
    }

    .quiz-title{
        margin-bottom:25px;
    }

    .quiz-title h1{
        font-size:28px;
    }

    .quiz-box{
        padding:20px;
    }

    .question-top{
        flex-direction:column;
        align-items:flex-start;
        gap:12px;
    }

    .question-top h2{
        font-size:20px;
    }

    .timer{
        font-size:14px;
        padding:8px 14px;
    }

    #question{
        font-size:24px;
        margin-bottom:25px;
    }

    .options{
        grid-template-columns:1fr;
        gap:15px;
    }

    .option-btn{
        font-size:17px;
        padding:16px;
    }

    .buttons{
        flex-direction:column;
        align-items:stretch;
    }

    .left-buttons{
        width:100%;
        flex-direction:column;
    }

    .btn{
        width:100%;
    }

    .review-top{
        flex-direction:column;
        align-items:flex-start;
    }

    .review-title{
        font-size:28px;
    }

    .score-board{
        width:100%;
        display:grid;
        grid-template-columns:repeat(2,1fr);
        gap:12px;
    }

    .score-card{
        width:100%;
        min-width:auto;
    }

    .review-question{
        padding:18px;
    }

    .review-question h3{
        font-size:20px;
    }

    .review-option{
        font-size:16px;
        padding:14px;
    }
}

/* Small Phones */

@media (max-width: 480px) {

    body{
        padding:10px;
    }

    .quiz-container{
        padding:15px;
        border-radius:18px;
    }

    .quiz-title h1{
        font-size:24px;
    }

    #question{
        font-size:20px;
        line-height:1.5;
    }

    .question-top h2{
        font-size:18px;
    }

    .option-btn{
        font-size:15px;
        padding:14px;
    }

    .btn{
        padding:12px 20px;
        font-size:14px;
    }

    .score-board{
        grid-template-columns:1fr;
    }

    .score-card h3{
        font-size:22px;
    }

    .review-title{
        font-size:24px;
    }

    .review-question h3{
        font-size:18px;
    }

    .review-option{
        font-size:15px;
    }
}
    </style>

</head>

<body>

    <div class="quiz-container">

        <!-- Top -->

        <div class="top-bar">

            <a href="index.html" class="back-btn">
                ←
            </a>

            <div class="progress-container">

                <div class="progress-bar">

                    <div class="progress" id="progress"></div>

                </div>

            </div>

        </div>

        <!-- Title -->

        <div class="quiz-title">

            <h1>
                SCIENCE & TECHNOLOGY QUIZ
            </h1>

        </div>

        <!-- Quiz -->

        <div class="quiz-box">

            <div class="question-top">

                <h2 id="question-number">
                    Question 1
                </h2>

                <div class="timer" id="timer">
                    3:00
                </div>

            </div>

            <div id="question"></div>

            <!-- Options -->

            <div class="options" id="options"></div>

            <!-- Buttons -->

            <div class="buttons">

                <div class="left-buttons">

                    <button class="btn prev-btn" id="prevBtn">
                        Previous
                    </button>

                    <button class="btn next-btn" id="nextBtn">
                        Next
                    </button>

                </div>

                <button class="btn submit-btn" id="submitBtn">
                    Submit Quiz
                </button>

            </div>

            <!-- Result -->

            <div class="result-box" id="resultBox">

                <h2 id="resultTitle"></h2>

                <p id="resultText"></p>

            </div>

        </div>

    </div>

    <script>

        const quizData = [

            {
                question: "What planet is known as the Red Planet?",
                options: ["Venus", "Mars", "Jupiter", "Saturn"],
                answer: "Mars"
            },

            {
                question: "Who invented the telephone?",
                options: ["Thomas Edison", "Nikola Tesla", "Alexander Graham Bell", "Newton"],
                answer: "Alexander Graham Bell"
            },

            {
                question: "What gas do plants absorb from the atmosphere?",
                options: ["Oxygen", "Carbon Dioxide", "Nitrogen", "Hydrogen"],
                answer: "Carbon Dioxide"
            },

            {
                question: "Which device is used to measure temperature?",
                options: ["Barometer", "Thermometer", "Speedometer", "Altimeter"],
                answer: "Thermometer"
            },

            {
                question: "Who developed the theory of relativity?",
                options: ["Newton", "Einstein", "Galileo", "Darwin"],
                answer: "Einstein"
            },

            {
                question: "What is the chemical symbol for gold?",
                options: ["Ag", "Go", "Au", "Gd"],
                answer: "Au"
            },

            {
                question: "Which part of the computer is considered the brain?",
                options: ["Monitor", "CPU", "Keyboard", "RAM"],
                answer: "CPU"
            },

            {
                question: "Which planet has the most moons?",
                options: ["Earth", "Mars", "Saturn", "Venus"],
                answer: "Saturn"
            },

            {
                question: "What is H2O commonly known as?",
                options: ["Hydrogen", "Salt", "Water", "Oxygen"],
                answer: "Water"
            },

            {
                question: "Who invented the light bulb?",
                options: ["Thomas Edison", "Tesla", "Bell", "Wright Brothers"],
                answer: "Thomas Edison"
            },

            {
                question: "Which organ pumps blood through the body?",
                options: ["Lungs", "Brain", "Heart", "Kidney"],
                answer: "Heart"
            },

            {
                question: "What is the fastest land animal?",
                options: ["Tiger", "Lion", "Cheetah", "Horse"],
                answer: "Cheetah"
            },

            {
                question: "Which planet is closest to the Sun?",
                options: ["Earth", "Mercury", "Mars", "Venus"],
                answer: "Mercury"
            },

            {
                question: "What does CPU stand for?",
                options: [
                    "Central Process Unit",
                    "Central Processing Unit",
                    "Computer Personal Unit",
                    "Central Processor Utility"
                ],
                answer: "Central Processing Unit"
            },

            {
                question: "Which scientist discovered gravity?",
                options: ["Newton", "Einstein", "Tesla", "Darwin"],
                answer: "Newton"
            }

        ];

        let currentQuestion = 0;

        let selectedAnswers =
            new Array(quizData.length).fill(null);

        const questionEl =
            document.getElementById("question");

        const optionsEl =
            document.getElementById("options");

        const questionNumber =
            document.getElementById("question-number");

        const progress =
            document.getElementById("progress");

        function loadQuestion() {

            const currentQuiz =
                quizData[currentQuestion];

            questionEl.innerText =
                currentQuiz.question;

            questionNumber.innerText =
                `Question ${currentQuestion + 1}`;

            progress.style.width =
                `${((currentQuestion + 1) / quizData.length) * 100}%`;

            optionsEl.innerHTML = "";

            currentQuiz.options.forEach(option => {

                const button =
                    document.createElement("button");

                button.classList.add("option-btn");

                button.innerText = option;

                if (
                    selectedAnswers[currentQuestion]
                    === option
                ) {

                    button.classList.add("selected");
                }

                button.addEventListener("click", () => {

                    selectedAnswers[currentQuestion]
                        = option;

                    document.querySelectorAll(".option-btn")
                        .forEach(btn =>
                            btn.classList.remove("selected"));

                    button.classList.add("selected");

                });

                optionsEl.appendChild(button);

            });

        }

        loadQuestion();

        // Next

        document.getElementById("nextBtn")
            .addEventListener("click", () => {

                if (
                    currentQuestion <
                    quizData.length - 1
                ) {

                    currentQuestion++;

                    loadQuestion();

                }

            });

        // Previous

        document.getElementById("prevBtn")
            .addEventListener("click", () => {

                if (currentQuestion > 0) {

                    currentQuestion--;

                    loadQuestion();

                }

            });

        // Timer

        let timeLeft = 180;

        const timerEl =
            document.getElementById("timer");

        const countdown = setInterval(() => {

            let minutes =
                Math.floor(timeLeft / 60);

            let seconds =
                timeLeft % 60;

            seconds =
                seconds < 10
                    ? "0" + seconds
                    : seconds;

            timerEl.innerText =
                `${minutes}:${seconds}`;

            timeLeft--;

            if (timeLeft < 0) {

                clearInterval(countdown);

                showResult(
                    "Time Is Over!",
                    "Quiz submitted automatically.",
                    "timeout"
                );

                setTimeout(() => {

                    showReview();

                }, 2500);

            }

        }, 1000);

        // Submit

        document.getElementById("submitBtn")
            .addEventListener("click", () => {

                clearInterval(countdown);

                showResult(
                    "Quiz Submitted!",
                    "Calculating your score...",
                    "success"
                );

                setTimeout(() => {

                    showReview();

                }, 2000);

            });

        // Result

        function showResult(title, text, type) {

            const resultBox =
                document.getElementById("resultBox");

            const resultTitle =
                document.getElementById("resultTitle");

            const resultText =
                document.getElementById("resultText");

            resultTitle.innerText = title;

            resultText.innerText = text;

            resultBox.style.display = "block";

            resultBox.className =
                `result-box ${type}`;

        }

        // Review

        function showReview() {

            const quizBox =
                document.querySelector(".quiz-box");

            let correct = 0;
            let wrong = 0;
            let attempted = 0;

            quizData.forEach((quiz, index) => {

                const userAnswer =
                    selectedAnswers[index];

                if (userAnswer !== null) {

                    attempted++;

                }

                if (userAnswer === quiz.answer) {

                    correct++;

                }

                else if (
                    userAnswer !== null &&
                    userAnswer !== quiz.answer
                ) {

                    wrong++;

                }

            });

            let reviewHTML = `

                <div class="review-top">

                    <h2 class="review-title">
                        Quiz Review
                    </h2>

                    <div class="score-board">

                        <div class="
                            score-card
                            total-score
                        ">

                            <h3>
                                ${correct}/${quizData.length}
                            </h3>

                            <p>Total Marks</p>

                        </div>

                        <div class="
                            score-card
                            attempted-score
                        ">

                            <h3>
                                ${attempted}
                            </h3>

                            <p>Attempted</p>

                        </div>

                        <div class="
                            score-card
                            correct-score
                        ">

                            <h3>
                                ${correct}
                            </h3>

                            <p>Correct</p>

                        </div>

                        <div class="
                            score-card
                            wrong-score
                        ">

                            <h3>
                                ${wrong}
                            </h3>

                            <p>Wrong</p>

                        </div>

                    </div>

                </div>

            `;

            quizData.forEach((quiz, index) => {

                const userAnswer =
                    selectedAnswers[index];

                const correctAnswer =
                    quiz.answer;

                reviewHTML += `

                    <div class="review-question">

                        <h3>
                            Q${index + 1}.
                            ${quiz.question}
                        </h3>

                `;

                quiz.options.forEach(option => {

                    let className = "";

                    if (
                        option === correctAnswer
                    ) {

                        className =
                            "correct-answer";
                    }

                    if (
                        option === userAnswer &&
                        option !== correctAnswer
                    ) {

                        className =
                            "wrong-answer";
                    }

                    reviewHTML += `

                        <div class="
                            review-option
                            ${className}
                        ">

                            ${option}

                        </div>

                    `;

                });

                reviewHTML += `

                        <p class="your-answer">

                            Your Answer:
                            ${userAnswer
                        ? userAnswer
                        : "Not Attempted"}

                        </p>

                        <p class="correct-text">

                            Correct Answer:
                            ${correctAnswer}

                        </p>

                    </div>

                `;

            });

            quizBox.innerHTML = reviewHTML;

        }

    </script>

</body>

</html>
